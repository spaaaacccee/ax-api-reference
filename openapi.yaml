        a temporary access URL to allow the file to be downloaded. This link is also available in the GET /contact/portfolio
        endpoint, but it is important to remember the link is only good for a set number of minutes (normally 30, but this
        value is returned as well). For POST (upload), this endpoint only accepts requests encoded using multipart/form-data.
        Note that you CANNOT test the POST part of this endpoint in the Relax console as it does not support file type parameters
        or multipart encoding.
      operationId: get_contact_portfolio_file
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: contactID
          in: query
          required: true
          description: The ID of the Contact to interact with.
          schema:
            type: number
        - name: portfolioID
          in: query
          required: true
          description: The ID of the portfolio object to interact with.
          schema:
            type: number
