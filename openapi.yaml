  /template:
    get:
      tags:
        - template
      summary: GET /template/
      description:
        Returns the results of a template filled in given the parameters. You can pass either a planID from the
        system to use a saved template, or you can pass the actual content of the template. It returns an array of results
        with two keys, CONTACTID and CONTENT. If attachmentPlanID is passed, it will also include the key ATTACHMENT.
      operationId: get_template
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: planID
          in: query
          required: false
          description: The ID of a template to use. One of planID or content is required.
          schema:
            type: number
        - name: content
          in: query
          required: false
          description:
            The template content to use. For example, anywhere you use the text [Trainee Full Name] it will replace
            that text with the contact's name. One of planID or content is required.
          schema:
            type: string
        - name: contactID
          in: query
          required: false
          description:
            The contact to generate the template for. Either contactID must be passed, or a search parameter to determine
            contacts (instanceID/type, userRoleID, etc.)
          schema:
            type: number
        - name: type
          in: query
          required: false
          description:
            The type of course to generate the template for. Use with the instanceID or ID parameters. Either a course
            type and ID must be passed or a contactID.
          schema:
            type: string
        - name: instanceID
          in: query
          required: false
          description:
            The course instance to generate the template for. If you pass an instanceID and type, you can generate
            an array of templates for each student on the course. Use the includeStatus parameter to determine which students
            you generate the template for. Either a course type and ID must be passed or another parameter which determines
            contacts (contactID, skillGroupID, contactRoleID, userRoleID).
          schema:
            type: number
        - name: ID
          in: query
          required: false
          description:
            The course to generate the template for. It is preferable to use instanceID as a course at the ID level
            does not have students. If you pass type and ID you must also pass a contactID.
          schema:
            type: number
        - name: includeStatus
          in: query
          required: false
          description: |-
            A list of statuses to generate a template for. The available statuses are: [All,Enrolled,Completed,Tentative,Cancelled,Suspended,Deferred]. This is used in combination with type and instanceID in order to generate templates for students.
            Default: Enrolled,Completed
          schema:
            type: string
        - name: attachmentPlanID
          in: query
          required: false
          description: The ID of a template to use as an attachment. Will populate a key ATTACHMENT in the return.
          schema:
            type: number
        - name: invoiceID
          in: query
          required: false
          description: An invoiceID. Passing this will correctly parse any invoice related fields.
          schema:
            type: number
        - name: userRoleID
          in: query
          required: false
          description: Return contacts who are users in this role. Can be a list.
          schema:
            type: number
        - name: contactRoleID
          in: query
          required: false
          description: Enterprise only. Return contacts who belong to this contact role. Can be a list.
          schema:
            type: number
        - name: skillGroupID
          in: query
          required: false
          description: Enterprise only. Return contacts whose contact role contains this skill group. Can be a list.
          schema:
            type: number
        - name: replaceContent
          in: query
          required: false
          description:
            JSON object (stringified) containing key value pairs. Keys will represent template fields which will
            then be replaced within the template, allowing custom content to be added. The values can be HTML content that the
            template field will be replaced with.
          schema:
            type: string
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nThis is an example of a return when getting a template\
            \ for a workshop. The parameters passed were: type=w, instanceID=123, includeStatus=All, and content=Hello [Trainee\
            \ Full Name] \nThis is an example of using a type and ID parameter with a contactID and a planID from a saved\
            \ template in the system."
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    - CONTENT: Hello Lisa Jones
                      CONTACTID: 438788
                    - CONTENT: Hello Julie Smith
                      CONTACTID: 508599
                    - CONTENT: Hello Jill Watston
                      CONTACTID: 323099
          x-legacy-examples:
            - |-
              [
                  {
                      "CONTENT": "Hello Jill Watston<br>\r\n<br>\r\nThank you for your interest in Certificate I in Business.<br>
              \r\n<br>\r\nHere are the units:\n\t\t\<table border="\\"0\\"" cellpadding="\\"1\\"" cellspacing="\\"1\\"" style="\\"width:" 500px;\\"="">
              <tbody><tr><td><strong>Name</strong></td><td><strong>Code</strong></td></tr><tr class="\\"units\\""><td>BSBADM101A</td>
              <td>Use business equipment and resources</td></tr><tr class="\\"units\\""><td>BSBCMM101A</td><td>Apply basic communication skills</td>
              </tr><tr class="\\"units\\""><td>BSBIND201A</td><td>Work effectively in a business environment</td></tr><tr class="\\"units\\""><td>BSBITU101A</td>
              <td>Operate a personal computer</td></tr><tr class="\\"units\\""><td>BSBITU102A</td><td>Develop keyboard skills</td></tr><tr class="\\"units\\"">
              <td>BSBITU201A</td><td>Produce simple word processed documents</td></tr><tr class="\\"units\\""><td>BSBITU202A</td><td>Create and use spreadsheets</td>
              </tr><tr class="\\"units\\""><td>BSBLED101A</td><td>Plan skills development</td></tr><tr class="\\"units\\""><td>BSBSUS201A</td>
              <td>Participate in environmentally sustainable work practices</td></tr><tr class="\\"units\\""><td>BSBWHS201A</td>
              <td>Contribute to health and safety of self and others</td></tr><tr class="\\"units\\""><td>BSBWOR202A</td><td>Organise and complete daily work activities</td>
              </tr></tbody></table>\r\n<br>\r\n<br>\r\nHave a nice day,<br>\r\nTracey Benussi<br>\r\n<strong>VM Learning</strong><br>\r\naccounts@vmlearning.com.au",
                      "CONTACTID": 323099
                  }
              ]
        default:
          $ref: "#/components/responses/Error"
  /template/email:
    post:
      tags:
        - template
      summary: POST /template/email
      description:
        Emails the selected template to the selected contacts. Returns a report of the results. As with /api/template
        you can pass either a planID from the system to use a saved template, or you can pass the actual content of the template.
      operationId: post_template_email
      security:
        - ApiToken: []
          WsToken: []
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema: &id056
              type: object
              properties:
                verbose:
                  type: boolean
                  description:
                    If passed, an additional key REPORT will be passed which will be an array with information
                    on each contact emailed.
                  default: "false"
                planID:
                  type: number
                  description: The ID of a template to use. One of planID or content is required.
                content:
                  type: string
                  description:
                    The template content to use. For example, anywhere you use the text [Trainee Full Name] it
                    will replace that text with the contact's name. One of planID or content is required.
                subject:
                  type: string
                  description:
                    The email subject. This must be passed if content is used. If planID is used and this parameter
                    is not passed, it will default to the name of the template.
                from:
                  type: string
                  description:
                    Must either be a valid email address or the contactID of a contact with a valid email address.
                    If not passed, it will default to the API user.
                to:
                  type: string
                  description:
                    "Optional. Will default to the value of the contactID. Supports a contactID, a list of contactIDs,
                    or the special values: [student,creator,client,owner,trainer] when used in conjunction with type=w or
                    p and an instanceID."
                contactID:
                  type: number
                  description:
                    The contact to email the template to. Either contactID must be passed, or a search parameter
                    to determine contacts (instanceID/type, userRoleID, etc.)
                type:
                  type: string
                  description:
                    The type of course to use. Use with the instanceID or ID parameters. Either a course type and
                    ID must be passed or a contactID.
                instanceID:
                  type: number
                  description:
                    The course instance. If you pass an instanceID and type, you can email a templates to each
                    student on the course with the one call. Use the includeStatus parameter to determine which students to
                    email.
                ID:
                  type: number
                  description:
                    The courseID to use. It is preferable to use instanceID as a course at the ID level does not
                    have students. If you pass type and ID you must also pass a contactID.
                includeStatus:
                  type: string
                  description:
                    "A list of statuses. Students that fall under the status will get the email. The available
                    statuses are: [All,Enrolled,Completed,Tentative,Cancelled,Suspended,Deferred]. This is used in combination
                    with type and instanceID."
                  default: Enrolled,Completed
                honourUnsubscribed:
                  type: boolean
                  description: If passed, any student that has unsubscribed from merge documents will NOT receive an email.
                  default: "false"
                attachmentPlanID:
                  type: number
                  description:
                    The ID of a template to use to attach as a PDF to the email. The filename will be the template
                    name.
                invoiceID:
                  type: number
                  description:
                    The invoiceID associated with this email. Passing this will correctly parse any invoice related
                    fields. To include an invoice as a separate PDF attachment, you must also pass invoiceAttachmentPlanID
                    .
                invoiceAttachmentPlanID:
                  type: number
                  description:
                    The ID of a template to use to attach an invoiceID as a PDF to the email. If used with invoiceID,
                    it will attach the template to the email with the filename Invoice_[N].pdf , where [N] is the invoice
                    number.
                attachAccreditedCertificate:
                  type: boolean
                  description:
                    If true, the system will attach the latest accredited certificate issed to the student. In
                    the case of an enrolment having mulitple certificates, it will attach the most recent Completed Qualification
                    certificate by issue date. Statement of Attainments will only be considered if there are no Completed
                    Qualification Certificates. Also note that this only works when an accredited instance ID is passed (type=p)
                    or a workshop instance linked to an accredited unit enrolment (type=w). It also only works when emailing
                    the student (to=student)
                  default: "false"
                attachWorkshopCertificate:
                  type: boolean
                  description:
                    If true, the system will attach the latest non-accredited certificate associated with the student.
                    In the case of an enrolment having mulitple certificates, it will attach the most recent by issue date.
                    Also note that this only works when a workshop instanceID (type=w) is passed and when emailing the student
                    (to=student).
                  default: "false"
                attachCertificateForThirdPartyRecipients:
                  type: boolean
                  description:
                    If true, the system will also email any third party recipients of certificates associated with
                    the enrolment. This only works in conjunction with attachAccreditedCertificate or attachWorkshopCertificate
                    and when emailing students.
                  default: "false"
                userRoleID:
                  type: number
                  description: Email contacts who are users in this role. Can be a list.
                contactRoleID:
                  type: number
                  description: Enterprise only. Email contacts who belong to this contact role. Can be a list.
                skillGroupID:
                  type: number
                  description: Enterprise only. Email contacts whose contact role contains this skill group. Can be a list.
                replaceContent:
                  type: string
                  description:
                    JSON object (stringified) containing key value pairs. Keys will represent template fields which
                    will then be replaced within the template, allowing custom content to be added. The values can be HTML
                    content that the template field will be replaced with.
                hasIcalAttachment:
                  type: boolean
                  description: If on, the events for the workshop will be attached to the email in iCalendar format.
                  default: "false"
                copyToAlternateEmailAddress:
                  type: boolean
                  description:
                    If on, the selected template will also be sent to the recipient's alternate email addresses
                    if valid.
                  default: "false"
                portfolioDocID:
                  type: number
                  description:
                    The ID of a portfolio document to attach to the email. The email recipient must be the document
                    owner or the employer of the document owner's primary organisation.
                  default: "false"
          application/json:
            schema: *id056
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nThis is an example of emailing students in a workshop.\
            \ The parameters passed were: type=w, instanceID=123, includeStatus='Enrolled,Completed', planID=123, subject='Here\
            \ is your email', and verbose=1"
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    FAILEDCOUNT: 2
                    MESSAGE:
                      "2 Email(s) sent successfully. 1 Email(s) not sent because the contact did not have a valid email
                      address. 1 Email(s) not sent because the contact has unsubscribed. "
                    ATTEMPTEDCOUNT: 4
                    SUCCESSCOUNT: 2
                    REPORT:
                      - SUBJECT: Here is your email
                        CONTACTID: 434324
                        TO:
                          - EMAILADDRESS: lisa.jones@abc.org.au
                            MESSAGE: "Email sent successfully. "
                            EMAILED: true
                            CONTACTID: 434324
                        FROM: no-reply@axcelerate.com
                      - SUBJECT: Here is your email
                        CONTACTID: 234234
                        TO:
                          - EMAILADDRESS: j.smith@fake.edu.au
                            MESSAGE: "Email sent successfully. "
                            EMAILED: true
                            CONTACTID: 234234
                        FROM: no-reply@axcelerate.com
                      - SUBJECT: Here is your email
                        CONTACTID: 234342
                        TO:
                          - EMAILADDRESS: bad.email.com.au
                            MESSAGE: "Invalid email address. "
                            EMAILED: false
                            CONTACTID: 234342
                        FROM: no-reply@axcelerate.com
                      - SUBJECT: Here is your email
                        CONTACTID: 98797
                        TO:
                          - EMAILADDRESS: mr.parker@fake.com.au
                            MESSAGE: "This contact has unsubscribed. "
                            EMAILED: false
                            CONTACTID: 98797
                        FROM: no-reply@axcelerate.com
        default:
          $ref: "#/components/responses/Error"
