  /course/enrolments:
    get:
      tags:
        - course
      summary: GET /course/enrolments
      description:
        "Return one or more Contacts enrolled in an activity Instance. \nNB: This currently works on Program and\
        \ Workshop (type=p & type=w) courses only!"
      operationId: get_course_enrolments
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: contactID
          in: query
          required: false
          description: The ID of the Contact.
          schema:
            type: number
        - name: orgID
          in: query
          required: false
          description: The ID of the Organisation.
          schema:
            type: number
        - name: instanceID
          in: query
          required: false
          description: The ID of the Activity Instance.
          schema:
            type: number
        - name: ID
          in: query
          required: false
          description: The ID Activity Type - Use this in combination with enrolmentDateOlderThan for speed.
          schema:
            type: number
        - name: enrolmentDateOlderThan
          in: query
          required: false
          description:
            "Get enrolments after this date - alternate param 'enrolmentDateLaterThan' (for sanity). NOTE: this
            is now restricted to 30 days. If you wish to retrieve enrolments older than 30 days, please use the lastUpdated
            or enrolmentDate min/max params. WARNING: Results will be limited to 25 unless also passing an ID parameter."
          schema:
            type: string
            format: date
        - name: lastUpdated_min
          in: query
          required: false
          description:
            "In 'YYYY-MM-DD hh:mm' format. The enrolment last updated date must be greater than or equal to this
            datetime. Enrolments last updated prior to Nov 2018 may not appear. Time is optional and in client's current timezone.
            NOTE: lastUpdated_min & max must be used together and can be up to 90 days apart ."
          schema:
            type: string
            format: date-time
        - name: lastUpdated_max
          in: query
          required: false
          description:
            In 'YYYY-MM-DD hh:mm' format. The enrolment last updated date must be less than or equal to this datetime.
            Enrolments last updated prior to Nov 2018 may not appear. Time is optional and in client's current timezone.
          schema:
            type: string
            format: date-time
        - name: enrolmentDate_min
          in: query
          required: false
          description:
            "In 'YYYY-MM-DD hh:mm' format. The enrolment date must be greater than or equal to this datetime. Time
            is optional and in client's current timezone. NOTE: enrolmentDate_min & max must be used together and can be up
            to 30 days apart ."
          schema:
            type: string
            format: date-time
        - name: enrolmentDate_max
          in: query
          required: false
          description:
            In 'YYYY-MM-DD hh:mm' format. The enrolment date must be less than or equal to this datetime. Time is
            optional and in client's current timezone.
          schema:
            type: string
            format: date-time
        - name: offset
          in: query
          required: false
          description: |-
            Used for paging - start at record.
            Default: 0
          schema:
            type: number
        - name: limit
          in: query
          required: false
          description: |-
            Used for paging - total records to retrieve.
            Default: 100
          schema:
            type: number
        - name: type
          in: query
          required: false
          description: |-
            The type of the activity. w = workshop, p = accredited program, el = e-learning. Only p & w work at this time
            Default: p
          schema:
            type: string
        - name: filterType
          in: query
          required: false
          description:
            Filter related activities. s = show Subjects and related eLearning, el = show related eLearning only.
            Only s & el works at this time . To use this filter you must also pass a contactID for the student.
          schema:
            type: string
        - name: includeOrgChildren
          in: query
          required: false
          description: When used in conjunction with orgID, will also return enrolments related to children of that organisation
          schema:
            type: string
        - name: includeAwards
          in: query
          required: false
          description: |-
            When set to true, will include the awards associated with the enrolments in the response. Not supported for e-learning or when using filterType.
            Default: false
          schema:
            type: string
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nThis returns an array of structs containing the unique\
            \ learnerID and contactID for each student's enrolment"
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    - ENROLMENTDATE: 2013-07-24 00:00
                      MOBILEPHONE: null
                      INSTANCEID: 32373
                      CONTACTID: 620392
                      STARTDATE: 2013-07-24 00:00
                      SURNAME: Forrest
                      ACTIVITIES:
                        - ENROLMENTDATE: 2013-07-24 00:00
