        and a MSG with any errors.
      operationId: post_contact_verifyUSI
      security:
        - ApiToken: []
          WsToken: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: &id019
              type: object
              properties:
                contactID:
                  type: number
                  description: The contactID of the contact to verify.
              required:
                - contactID
          application/json:
            schema: *id019
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nAn example successful call. The USI was correctly verified.\n\
            An example unsuccessful call. The USI was not verified because the first name did not match. The actual data returned\
            \ by the USI Service is in the DATA key.\nAn example unsuccessful call. An attempt was not made to verify the\
            \ USI because data was missing."
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    USI_VERIFIED: true
                    DATA:
                      usiStatus: Valid
                      firstName: MATCH
                      familyName: MATCH
                      dateOfBirth: MATCH
                    MSG: USI Verified successfully
                example2:
                  value:
                    USI_VERIFIED: false
                    DATA:
                      usiStatus: Valid
                      firstName: NO_MATCH
                      familyName: MATCH
                      dateOfBirth: MATCH
                    MSG:
                      "USI Valid but the student's personal data does not match. This must be fixed before their USI can
                      be marked as verified. Please check: First Name. "
                example3:
                  value:
                    USI_VERIFIED: false
                    MSG:
                      "An error exists for this contact and must be corrected before calling the USI Service. Date of birth
                      is required. "
        default:
          $ref: "#/components/responses/Error"
