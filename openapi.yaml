  /course/enquire:
    post:
      tags:
        - course
      summary: POST /course/enquire
      description:
        Allows an established contact to enquire on a course, or send a general enquiry. This must be called with
        a valid aXcelerate contactID.
      operationId: post_course_enquire
      security:
        - ApiToken: []
          WsToken: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: &id032
              type: object
              properties:
                contactID:
                  type: string
                  description: The contactID of the user. This is the value returned by the create contact API method.
                noteCodeID:
                  type: string
                  description:
                    The noteCodeID for the aXcelerate note to attach to the contact. If left blank will default
                    to leaving a system message
                comments:
                  type: string
                  description: The content of the enquiry.
                type:
                  type: string
                  description:
                    The course type. w = workshop, p = accredited program, el = e-learning. Don't use this param
                    for a general enquiry.
                ID:
                  type: string
                  description: The ID relating to the course type. Leave blank or don't include for a general enquiry.
                emailTo:
                  type: string
                  description:
                    An email to send the enquiry to. It can be a comma delimited list of emails. If blank, an email
                    will not be sent.
              required:
                - contactID
                - noteCodeID
          application/json:
            schema: *id032
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nThe response is a simple success value. On error, however,\
            \ the success variable will not be present and the standard error structure will be returned instead."
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    SUCCESS: true
        default:
          $ref: "#/components/responses/Error"
