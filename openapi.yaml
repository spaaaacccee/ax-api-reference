        - name: internationalContactID
          in: query
          required: false
          description: The ContactID of the Contact Record who is the International Contact for this Contact (CRICOS).
          schema:
            type: number
        - name: optionalID
          in: query
          required: false
          description: An optional identifier to use for this Contact record.
          schema:
            type: string
        - name: categoryIDs
          in: query
          required: false
          description: A list of valid category IDs. (adds to Contact ONLY)
          schema:
            type: string
            description: JSON-encoded value.
        - name: customField_[variableName]
          in: query
          required: false
          description:
            'Replace [variableName] with the actual customField variable name to update a customField value against
            the contact. If updating a custom field that supports multiple values, you can use comma-delimited values or a JSON
            array. If using comma-delimited, it is expected the data is URL encoded first. For example, to get 2 values: ''A,B''
            and ''C'' you would either pass: "[''A,B'',''C'']" or "A%2CB,C"'
          schema:
            type: string
        - name: domainIDs
          in: query
          required: false
          description:
            A list of domainIDs to set against the contact. This will overwrite any existing domains against the
            contact. Requires the Contact Domains feature to be enabled in the account.
          schema:
            type: string
            description: JSON-encoded value.
