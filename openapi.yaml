  /accounting/ecommerce/payment/ref/{reference}:
    get:
      tags:
        - accounting
      summary: GET /accounting/ecommerce/payment/ref/:reference
      description: Returns the current state of a payment flow process.
      operationId: get_accounting_ecommerce_payment_ref_reference
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
        - name: reference
          in: query
          required: true
          description: The external identifier for the payment flow process.
          schema:
            type: string
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nSTATE: The current state of this payment flow process.\
            \ (pending,paid,failed)\nREQUEST.CANCELURL:The client will be directed to this url if they cancel payment processing..\n\
            REQUEST.INVOICEGUID: The GUID of the aXcelerate invoice against which this payment will be applied.\nREQUEST.REDIRECTURL:\
            \ The client will be redirected to this url after payment processing.\nREQUEST.WEBHOOKURL: This property is for\
            \ internal use only.\nRESULT.ERROR.CODE: The error code that occurred during processing.\nRESULT.ERROR.MSG: Short\
            \ description of the raised error.\nRESULT.TRANSACTIONGUID: The aXcelerate identifier for this transaction. Only\
            \ available if STATE is Paid.\nRESULT.PLATFORM: The payment platform through which this payment was processed.\n\
            PLATFORMREFERENCE: The reference for this payment within the payment platform.\nRESULT.OK: This property should\
            \ not be used in new implementations. Use the STATE property.\nRESULT.TRANSACTIONID: This property should not\
            \ be used in new implementations. Use the STATE property."
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    REQUEST:
                      CANCELURL: https://some.domain.com/checkout.html
