  /contact/{contactID}:
    get:
      tags:
        - contact
      summary: GET /contact/:contactID
      description:
        Interacts with a specfic contact. You can read (GET) or update (PUT) contact details. The parameters below
        refer only to PUT requests.
      operationId: get_contact_contactID
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: contactID
          in: path
          required: true
          schema:
            type: string
        - name: givenName
          in: query
          required: false
          description: Given (first) name. Maximum 40 characters.
          schema:
            type: string
        - name: surname
          in: query
          required: false
          description: Surname (last name). Maximum 40 characters.
          schema:
            type: string
        - name: title
          in: query
          required: false
          description: Tile/salutation
          schema:
            type: string
        - name: emailAddress
          in: query
          required: false
          description: Email address. Must be a valid email address
          schema:
            type: string
        - name: ContactActive
          in: query
          required: false
          description: |-
            Retrieve Active Contact Records. Passing false will return inactive records.
            Default: true
          schema:
            type: boolean
        - name: dob
          in: query
          required: false
          description: Date of Birth in the format YYYY-MM-DD. This cannot be dated in the future.
          schema:
            type: string
            format: date
        - name: sex
          in: query
          required: false
          description: Must be only a single letter. Valid values are M, F or X (for Other)
          schema:
            type: string
        - name: middleName
          in: query
          required: false
          description: Middle name(s). Maximum 40 characters.
          schema:
            type: string
