  /agent:
    post:
      tags:
        - agent
      summary: POST /agent/
      description:
        "This endpoint is only available for clients using the Marketing/Sales Agents feature. POST will create
        a marketing agent for the contact ID specified in the request. PUT will update an existing marketing agent. A 412
        will be returned if any required parameters are missing or exceed allowed values. NOTE: PUT requests cannot reassign
        an agentID to a different contact, contactID or Agent ID will be used to locate the record, with contactID taking
        preference."
