  /course/discounts:
    get:
      tags:
        - course
      summary: GET /course/discounts
      description:
        Calculates potential discount values given a course instance, a contact, an originalPrice and any other
        additional information, including group booking size, promo codes etc. It also brings back information on the discounts
        that were applied. This discountIDs as well as the revisedPrice should be passed into the enrol method to properly
        apply these discounts to the enrolment.
      operationId: get_course_discounts
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: contactID
          in: query
          required: true
          description: The contactID - will check against membership, category and organisation discounts
          schema:
            type: number
        - name: type
          in: query
          required: true
          description: The type of course (w, p, el)
          schema:
            type: string
        - name: instanceID
          in: query
          required: true
          description: The instanceID of the course
          schema:
            type: number
        - name: originalPrice
          in: query
          required: true
          description:
            The original price of the course. This is the value that will be used to calculate the correct discounted
            price (returned as revisedPrice in the return struct)
          schema:
            type: number
        - name: GroupBookingSize
          in: query
          required: false
          description: The size of a group booking. Used to find any applicable group booking discounts
          schema:
            type: number
        - name: BookingDate
          in: query
          required: false
          description: |-
            The date of the booking. Used to calculate expiries and early bird specials
            Default: TODAY
          schema:
            type: string
            format: date
        - name: PromoCode
          in: query
          required: false
          description: Used to find promo discounts
          schema:
            type: string
        - name: ConcessionDiscountIDs
          in: query
          required: false
          description:
            A list of discountIDs of specific concession discounts. Only concession type discounts will apply here
            and only those that are linked to this course will be considered.
          schema:
            type: string
        - name: bookingInfo
          in: query
          required: false
          description: A JSON formatted string of any additional information that may affect discounts
          schema:
            type: string
      responses:
        "200":
          description: "Default Response Format: \njson \nSamples"
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
          x-legacy-examples:
            - |-
              {
                  "ORIGINALPRICE": 600,
                  "REVISEDPRICE": 526.50,
                  "TOTALSAVING": 73.50,
                  "DISCOUNTSAPPLIED": [
                      {
                          "DISCOUNTID": 6543,
                          "NAME": "$15 off for booking two weeks in advance",
                          "CALCULATIONDESCRIPTION": "$15 off",
                          "CALCULATIONMETHOD": "Flat rate off",
                          "CALCULATIONVALUE": 15,
