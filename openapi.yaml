  /contact/{contactID}/message:
    get:
      tags:
        - contact
      summary: GET /contact/:contactID/message
      description:
        Interacts with a specfic contact. You can read (GET) or update (PUT) a contact's message. The parameters
        below refer only to PUT requests.
      operationId: get_contact_contactID_message
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: contactID
          in: path
          required: true
          schema:
            type: string
        - name: message
          in: query
          required: true
          description: Message to be saved for the contact.
          schema:
            type: string
        - name: showAlert
          in: query
          required: true
          description: Whether a modal alert should be shown when viewing the contact's profile.
          schema:
            type: boolean
      responses:
        "200":
          description: "Default Response Format: \njson \nSchemas\nThe following will be returned"
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    MESSAGE: This is a message that will be displayed on the contact's profile.
                    SHOWALERT: "false"
        default:
          $ref: "#/components/responses/Error"
    put:
      tags:
        - contact
      summary: PUT /contact/:contactID/message
      description:
        Interacts with a specfic contact. You can read (GET) or update (PUT) a contact's message. The parameters
        below refer only to PUT requests.
      operationId: put_contact_contactID_message
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: contactID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: &id012
              type: object
              properties:
                message:
                  type: string
                  description: Message to be saved for the contact.
                showAlert:
                  type: boolean
                  description: Whether a modal alert should be shown when viewing the contact's profile.
              required:
                - message
                - showAlert
          application/json:
            schema: *id012
      responses:
        "200":
          description: "Default Response Format: \njson \nSchemas\nThe following will be returned"
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    MESSAGE: This is a message that will be displayed on the contact's profile.
                    SHOWALERT: "false"
        default:
          $ref: "#/components/responses/Error"
  /contacts/search:
    get:
      tags:
        - contacts
      summary: GET /contacts/search
      description:
        "A contact search. This method will return an array of contacts matching all the search parameters.\nThe\
        \ field values must be \nan exact match OR start with\nthe supplied parameters (i.e. wildcard on the right of the\
        \ string).\nYou can choose to search on almost any field or use the param 'q' or 'search' to perform search across\
        \ these fields: GIVENNAME, PREFERREDNAME, MIDDLENAME, SURNAME, EMAILADDRESS and MOBILEPHONE."
      operationId: get_contacts_search
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: q
          in: query
          required: false
          description: A Search String. i.e. q='Nathan Gordon'
          schema:
            type: string
        - name: offset
          in: query
          required: false
          description: |-
            Record to start at.
            Default: 0
          schema:
            type: number
        - name: displayLength
          in: query
          required: false
          description: |-
            Maximum number of records to return (up to a system maximum of 100)
            Default: 10
          schema:
            type: number
        - name: contactEntryDate
          in: query
          required: false
          description: yyyy-mm-dd formatted date
          schema:
            type: string
            format: date
        - name: lastUpdated
          in: query
          required: false
          description: yyyy-mm-dd formatted date
          schema:
            type: string
            format: date
        - name: givenName
          in: query
          required: false
          description: Given (first) name
          schema:
            type: string
        - name: surname
          in: query
          required: false
          description: Surname (last name)
          schema:
            type: string
        - name: emailAddress
          in: query
          required: false
          description: Email address. Must be a valid email address
          schema:
            type: string
        - name: contactRoleID
          in: query
          required: false
          description: Filter contacts who are in a particular Contact Role.
          schema:
            type: number
        - name: contactIDs
          in: query
          required: false
          description:
            A comma-delimited list of contactIDs to filter the result set by. This can be used in conjunction with
            other filters.
          schema:
            type: string
        - name: contactID
          in: query
          required: false
          description: Supplying a contact ID will perform an exact match search.
          schema:
            type: number
        - name: optionalID
          in: query
          required: false
          description: Supplying an Optional ID will perform an exact match search.
          schema:
            type: string
        - name: DOB
          in: query
          required: false
          description: yyyy-mm-dd formatted date
          schema:
            type: string
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nReturns an array of contact information. The following\
            \ example was a search on givenName=Scott and displayLength=3. Note that the AVETMISS 7.0 address fields will\
            \ also be returned if applicable to this contact. See the GET contact resource."
