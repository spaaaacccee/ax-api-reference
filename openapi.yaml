openapi: 3.0.3
info:
  title: aXcelerate RESTFul Service API
  version: "1.0"
  description: Generated from the legacy HTML API documentation export in source.html.
servers:
  - url: https://{domain}.axcelerate.com/api
    variables:
      domain:
        default: app
paths:
  /accounting/invoice:
    get:
      tags:
        - accounting
      summary: GET /accounting/invoice/
      description:
        "Get an array of invoices for an account(GET). Or create a new invoice (POST).\nThe general process for\
        \ creating the expected payload of the AITEM field is as follows:\nCreate an array of line items. Depending on the\
        \ programming language that would be a structs / dictionary / hashmap).\nSerialize the array to JSON. \nPass the serialised\
        \ string in the AITEM form field."
      operationId: get_accounting_invoice
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: contactID
          in: query
          required: true
          description: REQUIRED for both actions.The contactID to return invoices for that contact
          schema:
            type: number
        - name: firstname
          in: query
          required: false
          description: REQUIRED for POST(create) only.Given Names invoice bill to
          schema:
            type: string
        - name: surname
          in: query
          required: false
          description: REQUIRED for POST(create) only.Last Names invoice bill to
          schema:
            type: string
        - name: invoiceDate
          in: query
          required: true
          description: REQUIRED for POST(create) supported format YYYY-MM-DD
          schema:
            type: string
        - name: orderDate
          in: query
          required: true
          description: REQUIRED for POST(create) supported format YYYY-MM-DD
          schema:
            type: string
        - name: externalReference
          in: query
          required: false
          description: Optional. External Reference Key (60 characters max)
          schema:
            type: string
        - name: aItem
          in: query
          required: false
          description: REQUIRED for POST(create) only.Invoice item(s) data in json format
          schema:
            type: string
            description: JSON-encoded value.
        - name: aItem.DESCRIPTION
          in: query
          required: true
          description: The item description
          schema:
            type: string
        - name: aItem.QTY
          in: query
          required: false
          description:
            REQUIRED for POST(create) only.Item Quantity. Must be greater than zero. If QTY is zero and an ITEMID
            is defined then the line item matching that ITEMID is removed from the invoice.
          schema:
            type: number
        - name: aItem.ITEMCODE
          in: query
          required: true
          description: The item code associated with this line item.
          schema:
            type: string
        - name: aItem.ITEMID
          in: query
          required: false
          description:
            "To edit an existing line item the ITEMID must be specified, for a new line item this value can be omitted
            or set to zero. Note: If an ITEMID is specified and QTY is set to zero then that line item is deleted from the invoice."
          schema:
            type: number
        - name: aItem.FINANCECODE
          in: query
          required: true
          description: The finance code to associate with the line-item.
          schema:
            type: string
        - name: aItem.TAXPERCENT
          in: query
          required: true
          description: "The amount of GST on that item ten percent would be: 10"
          schema:
            type: number
        - name: aItem.HASCHILDREN
          in: query
          required: false
          description: REQUIRED for POST(create) only.whether item has children
          schema:
            type: boolean
        - name: aItem.COSTCENTRECODE
          in: query
          required: false
          description: The cost center that is associated with the line-item.
          schema:
            type: string
        - name: aItem.UNITPRICEGROSS
          in: query
          required: true
          description: "The gross price for a single quantity of the item. Fifteen Dollars Ninety Six Cents would be: 15.96"
          schema:
            type: number
        - name: aItem.DOMAINID
          in: query
          required: false
          description: The system-id of the domain that is to be associated with the line-item.
          schema:
            type: number
        - name: aItem.SERVICEDATE
          in: query
          required: false
          description:
            "The service date associated with the line-item. Supported Formats are: {ts 'YYYY-MM-DDThh:mm:ss'}
            or YYYY-MM-DDThh:mm:ss"
          schema:
            type: string
            format: date
        - name: aItem.PARTID
          in: query
          required: false
          description: Optional for POST(create).Part ID for invoice item
          schema:
            type: number
        - name: aItem.DATA
          in: query
          required: false
          description: Optional for POST(create).Invoice item data
          schema:
            type: string
      responses:
        "200":
          description:
            "Default Response Format: \nJSON \nSamples\nInvoice array returned in JSON format. For more details\
            \ directly call the /accounting/invoice/:invoiceID endpoint\nNEW Invoice array returned in JSON format.\nNEW Invoice\
            \ Item array example.\nFor creating an invoice with a new line item\nFor editing an existing line item. (note\
            \ specifying an itemid)\nFor deleting a line item from the invoice.(note specifying an item id and setting qty\
            \ to zero)"
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    - INVOICENR: INV0002
                      PRICEGROSS: 20
                      DUEDATE: "2014-06-09"
