                  type: number
                  description:
                    The ID of the Contact that is paying for the course. If omitted, it will be assumed that the
                    student (contactID) is paying.
                invoiceID:
                  type: number
                  description:
                    The ID of the invoice created for this Contact (created during payment) OR the ID of the invoice
                    you wish to add this enrolment to. If the invoiceID is not passed, or is 0, the booking will still go
                    ahead and the contact will be invoiced for it.
                  default: "0"
                PONumber:
                  type: string
                  description: If a new invoice is generated as a result of this booking, use this as the Purchase Order Number.
                generateInvoice:
                  type: boolean
                  description:
                    Determines whether you'd like a new invoice to be generated as a result of this booking. This
                    will only work if the course cost is greater than $0. This also will not work if your aXcelerate System
                    Settings are set to 'Free Online Bookings'.
                  default: "true"
                lockInvoiceItems:
                  type: boolean
                  description:
                    If an new invoice is generated, determines whether the items are locked. Items must be locked
                    before a payment can be applied against an invoice. However, some invoice details can later be changed,
                    such as address and purchase order numbers.
                  default: "true"
                archiveInvoice:
                  type: boolean
                  description:
                    If an new invoice is generated, determines whether it is completely locked and archived. Once
                    archived, no invoice details can later be changed.
                  default: "false"
                forceBooking:
                  type: boolean
                  description: Don't check to see if the enrolment is closed first.
                  default: "false"
                bookOnDefaultWorkshops:
                  type: boolean
                  description:
                    Applicable only to program bookings (type=p), this will book the contact into any workshops
                    linked to the class's units. For this to work, each unit in the class can only be linked to a single workshop.
                    An error will be thrown if more than one workshop is against a class unit and this parameter is set to
                    true.
                  default: "true"
                syncDatesWithWorkshop:
                  type: boolean
                  description:
                    Applicable only to program bookings (type=p) and where bookOnDefaultWorkshops is true. This
                    will set unit start/end dates to the same as that of the linked workshops.
                  default: "true"
                syncUOCdates:
                  type: boolean
                  description:
                    Applicable only to program bookings (type=p). Will set the Unit of Competency start and end
                    dates to match those of the Unit of Study. It will only work if 'syncDatesWithWorkshop' set to FALSE
                  default: "false"
                syncWithClassSchedule:
                  type: boolean
                  description:
                    Applicable only to program bookings (type=p) and passing the dateCommenced parameter. This
                    will offset all unit start/end dates based on the offset between the student's date commenced and the
                    class start.
                  default: "false"
                applyGST (DEPRECATED - Please use the GST_TYPE parameter):
                  type: boolean
                  description:
                    Applicable only to program bookings (type=p) - if true will mark the cost as includes GST.
                    Normally, accredited training should be GST-free.
                  default: "false"
                GST_type:
                  type: number
                  description: GST type; 0- no GST, 1- GST included
                autoGrantCT:
                  type: boolean
                  description:
                    Applicable to any accredited bookings. The system will automatically set the subject outcome
                    to CT for students where it detects a pre-existing competency. This will also prevent the student from
                    being enrolled into any linked workshops or E-Learning for that subject. Subjects that expire will not
                    have competencies automatically granted.
                  default: "false"
                dateCommenced:
                  type: string
                  format: date
                  description: Applicable only to program bookings (type=p) - The enrolment Commencement Date.
                dateCompletionExpected:
                  type: string
                  format: date
                  description:
                    Applicable only to program bookings (type=p) - The Expected Completion Date. Ignored if using
                    syncWithClassSchedule
                suppressNotifications:
                  type: boolean
                  description: Don't send any email booking notifications. Auto-generate user emails will still send.
                  default: "false"
                sendAdminNotification:
                  type: boolean
                  description: If suppressNotifications is true, this allows the admin booking notification to still be sent.
                  default: "false"
                blockAdminNotification:
                  type: boolean
                  description: Explicitly blocks the admin notification, regardless of suppress settings
                  default: "false"
                useRegistrationFormDefaults:
                  type: boolean
                  description:
                    Used for direct or linked accredited program bookings (type p). If true, the system will apply
                    the default enrolment form values set against the system settings. This form can be edited under Settings
                    > Registration Form > Class Enrolment Form.
                  default: "false"
                StudyReasonID:
                  type: number
                  description: AVETMISS Study Reason (For Accredited enrolments).
                FundingNational:
                  type: number
                  description:
                    AVETMISS Funding Source - National (For Accredited enrolments) - See sample table below for
                    values.
                marketingAgentContactID:
                  type: number
                  description: The ID of the Contact that should be set as the marketing agent for the enrolment.
                serviceDate:
                  type: string
                  description: The (invoice item) Service date.
                cost:
                  type: number
                  description: The Discounted Cost.
                commencingProgramCohortIdentifiers:
                  type: string
                  description: Commencing program cohort ID. Maximum of first 6 characters considered.
                discountIDList:
                  type: string
                  description: A list of valid discountIDs for this booking. Required when 'cost' is passed.
                customField_[variableName]:
                  type: string
                  description:
                    'Replace [variableName] with the actual customField variable name to set a customField value
                    against the enrolment (if enabled and set up). If updating a custom field that supports multiple values,
                    you can use comma-delimited values or a JSON array. If using comma-delimited, it is expected the data
                    is URL encoded first. For example, to get 2 values: ''A,B'' and ''C'' you would either pass: "[''A,B'',''C'']"
                    or "A%2CB,C"'
                FundingState:
                  type: string
                  description: AVETMISS Funding Source - State (For Accredited enrolments) - See sample table below for values.
                PSTACDateVIC:
                  type: string
                  format: date
                  description: "[Type=P] Program Supervised Teaching Activity Completion Date for Victorian AVETMISS reporting."
                commencedWhileAtSchool:
                  type: boolean
                  description: "[Type=P] Commenced While at School Flag for Victorian AVETMISS reporting."
              required:
                - contactID
                - instanceID
                - type
          application/json:
            schema: *id029
      responses:
