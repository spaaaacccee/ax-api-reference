  /course/instance/search:
    post:
      tags:
        - course
      summary: POST /course/instance/search
      description: Advanced Course Instance Search - Returns instances.
      operationId: post_course_instance_search
      security:
        - ApiToken: []
          WsToken: []
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema: &id025
              type: object
              properties:
                ID:
                  type: number
                  description: The Activity Type ID.
                InstanceID:
                  type: number
                  description: The Instance ID.
                type:
                  type: string
                  description:
                    The type of the activity. w = workshop, p = accredited program, el = e-learning, all = workshops,
                    accredited programs and e-learning.
                trainingCategory:
                  type: string
                  description: The Training Category to Search - Uses Like operator %name%
                location:
                  type: string
                  description:
                    The course delivery location to search - Uses Like operator %name%. Only works with type 'w'
                    instances where a delivery location is specified. Matches on Display Name if it is used or Delivery Location
                    Name if Display Name is blank.
                state:
                  type: string
                  description: The course State to search - works with type 'w' & 'p' instances.
                code:
                  type: string
                  description: "The course code to search - Uses Like operator: code%"
                name:
                  type: string
                  description: The course name to search - Uses Like operator %name%
                searchTerm:
                  type: string
                  description: For a general search use this param
                enrolmentOpen:
                  type: boolean
                  description: Return Course Instances that are open for enrolment.
                  default: "true"
                startDate_min:
                  type: string
                  format: date
                  description:
                    The course start date must be greater than this date. Null values will also be returned for
                    el and p types. Ignored if instanceID is passed.
                  default: 3 months ago
                startDate_max:
                  type: string
                  format: date
                  description:
                    The course start date must be less than this date. Null values will also be returned for el
                    and p types. Ignored if instanceID is passed.
                  default: 3 months ahead
                finishDate_min:
                  type: string
                  format: date
                  description:
                    The course finish date must be greater than this date. Null values will also be returned for
                    el and p types.
                  default: 3 months ago
                finishDate_max:
                  type: string
                  format: date
                  description:
                    The course finish date must be less than this date. Null values will also be returned for el
                    and p types.
                  default: 3 months ahead
                lastUpdated_min:
                  type: string
                  format: date-time
                  description:
                    "In 'YYYY-MM-DD hh:mm' format with time optional. The course instance last updated date must
                    be greater than or equal to this datetime. NOTE: lastUpdated_min & max must be used together (unless ID
                    is passed) and can be up to 90 days apart . These fields are mutually exclusive with start and finish
                    date min/max searches and are both ignored if instanceID is passed."
                lastUpdated_max:
                  type: string
                  format: date-time
                  description:
                    In 'YYYY-MM-DD hh:mm' format with time optional. The course instance last updated date must
                    be less than or equal to this datetime.
                trainerContactID:
                  type: number
                  description: The ContactID of the Trainer/Consultant the instance is assigned to.
                domainID:
                  type: number
                  description: The DomainID the instance belongs to (the domainID of the user).
                deliveryLocationID:
                  type: number
                  description:
                    For type = p only. The unique ID of an accredited delivery location, reported to NCVER. Refers
                    to locations listed under the course/deliveryLocations endpoint.
                orgID:
                  type: number
                  description: The organisation ID of the Client Contact of the course.
                orgIDTree:
                  type: number
                  description:
                    The Client Contact of the course is either this Organisation ID or a child organisation of
                    this Organisation ID.
                offset:
                  type: number
                  description: Used for paging - start at record.
                  default: "0"
                displayLength:
                  type: number
                  description: Used for paging - total records to retrieve.
                  default: "10"
                sortColumn:
                  type: number
                  description: The column index to sort by.
                  default: "1"
                sortDirection:
                  type: string
                  description: The sort by direction 'ASC' OR 'DESC'.
                  default: ASC
                public:
                  type: boolean
                  description: Whether to include public courses. If false, returns only In-House course instances.
                  default: "true"
                isActive:
                  type: boolean
                  description: You can chose to include or exclude Deleted / Archived and Inactive courses.
                purgeCache:
                  type: boolean
                  description:
                    Currently the API will cache the query for 30 seconds - Setting this flag to true gets the
                    latest data.
                  default: "true"
                groupedCourseName:
                  type: string
                  description:
                    If the Grouped Workshop Data flag is on in your account, you can search by the Grouped Course
                    Name (Type W Only)
                groupedCourseID:
                  type: string
                  description:
                    If the Grouped Workshop Data flag is on in your account, you can search by the Grouped Course
                    ID (Type W Only)
                Status:
                  type: string
                  description:
                    "Status of the Workshop. The available choices are as follows: Active, Cancelled, Completed,
                    Incomplete, Tentative"
          application/json:
            schema: *id025
      responses:
