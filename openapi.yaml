        in JSON format.
      operationId: post_report_saved_run
      security:
        - ApiToken: []
          WsToken: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: &id047
              type: object
              properties:
                reportID:
                  type: number
                  description: ReportID of the saved report to run.
                filterOverride:
                  type: string
                  description:
                    "Override the standard filter value(s): e.g: To override the Enrolment Status Value you can
                    pass: [{NAME:'enrolments.enrolstatus', VALUE:'canc', VALUE2:''}] NOTE: You cannot test/use this
                    in our API relax console simulator"
                displayLength:
                  type: number
                  description:
                    "a.k.a 'pageSize' - Warehoused reports only: The maximum supported value is 1000. The number
                    of row objects to return in the data[] response element. This should be used in conjunction with offsetRows
                    to page through data. Wait for a response before calling the next page of data."
                offsetRows:
                  type: number
                  description:
                    "Warehoused reports only: The number of report rows to skip before returning row objects in
                    the data[] response element. The maximum supported value is 100,000. Reports larger than this are not
                    supported"
              required:
                - reportID
                - displayLength
                - offsetRows
