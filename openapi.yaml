  /task:
    get:
      tags:
        - task
      summary: GET /task/
      description: Interacts with workflow user tasks. These are tasks that can be found when going to Settings > Workflow.
      operationId: get_task
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: taskID
          in: query
          required: false
          description:
            "The ID for the task. Required for GET, PUT and DELETE. Not valid for POST requests. Can also be added
            to the URL, as in: api/task/:taskID"
          schema:
            type: number
        - name: name
          in: query
          required: false
          description: The task - required when creating a new task.
          schema:
            type: string
        - name: details
          in: query
          required: false
          description: Optional additional details for the task
          schema:
            type: string
        - name: dueDate
          in: query
          required: false
          description: "The task due date. This should be set using the format: YYYY-MM-DD"
          schema:
            type: string
            format: date
        - name: ownerID
          in: query
          required: false
          description: The contactID of the user responsible for the task
          schema:
            type: number
        - name: status
          in: query
          required: false
          description: |-
            The status for the task. Possible statuses are from 1-4. See endpoint api/task/statuses for a list of statuses
            Default: 1
          schema:
            type: number
        - name: priority
          in: query
          required: false
          description: |-
            The priority for the task. Possible priorities are from 1 (Low) to 4 (Urgent). See endpoint api/task/priorities for a list
            Default: 2
          schema:
            type: number
        - name: completedDate
          in: query
          required: false
          description: "Only valid for status 4 (Completed). Use format: YYYY-MM-DD"
          schema:
            type: string
            format: date
        - name: categoryID
          in: query
          required: false
          description:
            A category for the task. Task categories are user-defined and can be managed using the task/category
            endpoint.
          schema:
            type: number
        - name: reminderDate
          in: query
          required: false
          description:
            "A date and time to set an email reminder. Only valid for users with the Workflow Engine feature. Format:
            YYYY-MM-DD hh:mm"
          schema:
            type: string
            format: date-time
        - name: PDataID
          in: query
          required: false
          description: To link a task to a workshop instance. You can also use the parameters, type='w' and instanceID
          schema:
            type: number
        - name: ProgramCodeID
          in: query
          required: false
          description: To link a task to a workshop type. You can also use the parameters, type='w' and ID
          schema:
            type: number
        - name: classID
          in: query
          required: false
          description: To link a task to a class instance. You can also use the parameters, type='p' and instanceID
          schema:
            type: number
        - name: diplomaID
          in: query
          required: false
          description: To link a task to a qualification or class type. You can also use the parameters, type='p' and ID
          schema:
            type: number
        - name: marketingLearningActivityID
          in: query
          required: false
          description: To link a task to an E-Learning instance.
          schema:
            type: number
        - name: marketingContactID
          in: query
          required: false
          description:
            To link a task to a contact. If this field is set, the task is considered to be a marketing Follow-up
            task. If this field is not set, all forecast and opportunity fields will be ignored.
          schema:
            type: number
        - name: OpportunityStatus
          in: query
          required: false
          description:
            The opportunity status of a marketing task. See endpoint task/opportunityStatuses for a list of valid
            values. This field is required if you give the task a Forecast value
          schema:
            type: number
        - name: ForecastValue
          in: query
          required: false
          description: The monetary value of a task, for forecast calculation purposes.
          schema:
            type: number
        - name: ForecastProbability
          in: query
          required: false
          description:
            The percentage chance of the forecast task being converted. It must be a value between 0 and 100. If,
            for example, you attempt to set this value to 200 - an error will not be thrown, it will simply set it to 100.
          schema:
            type: number
        - name: ForecastDistribution_Month
          in: query
          required: false
          description:
            Works with the ForecastDistribution_Value parameter and you can have more than one (a list). It is the
            forecast month. You can specify in YYYY-MM or YYYY-MM-DD format. Day will be truncated to the first.
          schema:
            type: string
            format: date
        - name: ForecastDistribution_Value
          in: query
          required: false
          description: The monetary value of a task for the matching ForecastDistribution_Month
          schema:
            type: number
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nThe main task JSON returned for a standard task.\nThe main\
            \ task JSON returned for a marketing task."
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    REMINDERSCHEDULEID: 2898
                    DUEDATE: 2014-09-18 08:30
