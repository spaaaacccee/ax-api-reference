                  description:
                    "A JSON representation of an array of filter structs to pass to the report. The structs must
                    have the keys: name, value, and operator. For a list of available filters for a report, query the API
                    api/report/fields . For a more comprehensive list of the values and operators available for a field, query
                    the API api/report/field and pass the field name as 'fieldReference'. The string is not case sensitive.
