  /accounting/transaction:
    get:
      tags:
        - accounting
      summary: GET /accounting/transaction/
      description:
        Get a list of transactions for a contact (GET). Or record a new transaction which can optionally be applied
        against an invoice (POST).
      operationId: get_accounting_transaction
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: contactID
          in: query
          required: true
          description:
            The contact to record the transaction against or search for transactions for (GET method). This should
            be the person who paid.
          schema:
            type: number
        - name: amount
          in: query
          required: true
          description: Transaction amount in dollars
          schema:
            type: number
        - name: invoiceID
          in: query
          required: false
          description: If applied, this transaction will be recorded and then applied against this invoice.
          schema:
            type: number
        - name: paymentMethodID
          in: query
          required: false
          description: |-
            Recorded payment method. The options are: 1=Cash, 2=Credit Card, 4=Direct Deposit, 5=Cheque, 6=EFTPOS
            Default: 2
          schema:
            type: number
        - name: transDate
          in: query
          required: false
          description: |-
            The date of the transaction.
            Default: Now()
          schema:
            type: string
            format: date-time
        - name: reference
          in: query
          required: false
          description: An optional reference / reciept number
          schema:
            type: string
        - name: description
          in: query
          required: false
          description: An optional description
          schema:
            type: string
        - name: ChequeNr
          in: query
          required: false
          description: Optional. For cheque types (5)
          schema:
            type: string
        - name: ChequeDrawer
          in: query
          required: false
          description: Optional. For cheque types (5)
          schema:
            type: string
        - name: BankName
          in: query
          required: false
          description: Optional. For cheque types (5)
          schema:
            type: string
        - name: BankBSB
          in: query
          required: false
          description: Optional. For cheque types (5). Must be a 6-digit number if passed
          schema:
            type: string
        - name: includeFragments
          in: query
          required: false
          description: |-
            Optional. For the GET search only. Will return the fragments array with each transaction
            Default: false
          schema:
            type: boolean
      responses:
        "200":
          description:
            "Default Response Format: \nSamples\nOn a POST request to create a transaction, will return a transaction\
            \ JSON object to represent the new transaction. To check if an amount was assigned to the invoice (if applicable),\
            \ see the fragments array in the returned struct. \nOn a GET search request, returns an array of transaction JSON\
            \ objects. Use the optional parameter includeFragments to include the FRAGMENTS array."
