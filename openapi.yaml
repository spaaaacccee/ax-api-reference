                  description:
                    "The Victorian Student Number The VSN is a student identification number that is assigned by\
                    \ the Department of Education and Early Childhood Development to all students in government and non\u2011\
                    government schools, and students in Vocational Education and Training institutions."
                WorkReadyParticipantNumber:
                  type: string
