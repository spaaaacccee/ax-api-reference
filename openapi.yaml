    put:
      tags:
        - contact
      summary: PUT /contact/:contactID
      description:
        Interacts with a specfic contact. You can read (GET) or update (PUT) contact details. The parameters below
        refer only to PUT requests.
      operationId: put_contact_contactID
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: contactID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema: &id011
              type: object
              properties:
                givenName:
                  type: string
                  description: Given (first) name. Maximum 40 characters.
                surname:
                  type: string
                  description: Surname (last name). Maximum 40 characters.
                title:
                  type: string
                  description: Tile/salutation
                emailAddress:
                  type: string
                  description: Email address. Must be a valid email address
                ContactActive:
                  type: boolean
                  description: Retrieve Active Contact Records. Passing false will return inactive records.
                  default: "true"
                dob:
                  type: string
                  format: date
                  description: Date of Birth in the format YYYY-MM-DD. This cannot be dated in the future.
                sex:
                  type: string
                  description: Must be only a single letter. Valid values are M, F or X (for Other)
                middleName:
                  type: string
                  description: Middle name(s). Maximum 40 characters.
                phone:
                  type: string
                  description: Home phone number
                mobilephone:
                  type: string
                  description: Mobile phone number
                workphone:
                  type: string
                  description: Work phone number
                fax:
                  type: string
                  description: Fax number
                organisation:
                  type: string
                  description: Organisation name
                orgId:
                  type: string
                  description:
                    ID of the organisation to assign the contact. Will be their primary organisation if the contact
                    has multiple.
                orgIds:
                  type: string
                  description:
                    A list of organisation IDs to set against the contact. This will overwrite any existing non-primary
                    organisations against the contact. This will allow upto five organisation IDs.
                position:
                  type: string
                  description: Position within the organisation
                section:
                  type: string
                  description: Section within the organisation
                division:
                  type: string
                  description: Division within the organisation
                SourceCodeID:
                  type: number
                  description:
                    The client-specific sourceID from the list set up in aXcelerate and returned from the contact/sources
                    resource.
                HistoricClientID:
                  type: string
                  description:
                    "The Historical ID used with the student record. IMPORTANT IF: you have reported a person previously
                    with a different SMS."
                USI:
                  type: string
                  description:
                    "Unique Student Identifier (USI). A 10-digit code. If passed, this code must conform to the
                    minimum validation: It must be 10 digits in length and consist of only capital letters and numbers, excluding
                    I, 1, 0 and O."
                LUI:
                  type: string
                  description: The Queensland Studies Authority Learner Unique Identifier (LUI). A 10-digit, numeric code.
                VSN:
                  type: string
                  description:
                    "The Victorian Student Number The VSN is a student identification number that is assigned by\
                    \ the Department of Education and Early Childhood Development to all students in government and non\u2011\
                    government schools, and students in Vocational Education and Training institutions."
                WorkReadyParticipantNumber:
                  type: string
                  description: This field was formerly knows as 'Skills for All Number'. A South Australian student identifier.
                SACEStudentID:
                  type: string
                  description:
                    South Australian Certificate of Education student identifier. It should consist of six numbers
                    and one alpha letter, for e.g., 123456A.
                EmergencyContact:
                  type: string
                  description: Name of an emergency contact
                EmergencyContactRelation:
                  type: string
                  description: The relationship of the emergency contact (eg sister)
                EmergencyContactPhone:
                  type: string
                  description: The phone number of the emergency contact
                ParentContactID:
                  type: number
                  description: The contactID of the parent or guardian
                buildingName:
                  type: string
                  description:
                    AVETMISS 7.0 fields - will take these fields over address1 and address2 if passed. Note, you
                    cannot search contacts by these discrete fields.
                unitNo:
                  type: string
                  description: AVETMISS 7.0 fields
                streetNo:
                  type: string
                  description: AVETMISS 7.0 fields
                streetName:
                  type: string
                  description: AVETMISS 7.0 fields
                POBox:
                  type: string
                  description: AVETMISS 7.0 fields
                address1:
                  type: string
                  description:
                    First line of POSTAL address - address fields will be used only if AVETMISS 7.0 fields not
                    passed. The return structure will also include these fields.
                address2:
                  type: string
                  description: Second line of postal address
                city:
                  type: string
                  description: Postal suburb, locality or town
                state:
                  type: string
                  description:
                    "Postal state / Territory. NOTE: This field is tailored for Australia and accepts only the
                    following values: NSW, VIC, QLD, SA, WA, TAS, NT, ACT or OTH (which means 'Other Australian Territory')
                    or OVS (which means 'Overseas')"
                postcode:
                  type: string
                  description: Postal postcode
                countryID:
                  type: number
                  description:
                    Postal Country - a 4-digit SACC code. This is only used if the full AVETMISS 7.0 address details
                    are passed. Otherwise this field is ignored. Use Country instead.
                country:
                  type: string
                  description: Postal Country
                sbuildingName:
                  type: string
                  description:
                    AVETMISS 7.0 fields - will take these fields over address1 and address2 if passed. Note, you
                    cannot search contacts by these discrete fields.
                sunitNo:
                  type: string
                  description: AVETMISS 7.0 fields
                sstreetNo:
                  type: string
                  description: AVETMISS 7.0 fields
                sstreetName:
                  type: string
                  description: AVETMISS 7.0 fields
                sPOBox:
                  type: string
                  description: AVETMISS 7.0 fields
                saddress1:
                  type: string
                  description:
                    First line of STREET / residential address - address fields will be deprecated with the coming
                    of AVETMISS 7.0 which will break the address into further fields (eg Flat/unit number, Street Name)
                saddress2:
                  type: string
                  description: Second line of street / residential address - to be deprecated in the future
                scity:
                  type: string
                  description: Residential suburb, locality or town
                sstate:
                  type: string
                  description:
                    "Residential state / Territory. NOTE: This field is tailored for Australia and accepts only
                    the following values: NSW, VIC, QLD, SA, WA, TAS, NT, ACT or OTH (which means 'Other Australian Territory')
                    or OVS (which means 'Overseas')"
                spostcode:
                  type: string
                  description: Residential postcode
                scountryID:
                  type: number
                  description:
                    Residential Country - a 4-digit SACC code. This is only used if the full AVETMISS 7.0 address
                    details are passed. Otherwise this field is ignored. Use SCountry instead.
                scountry:
                  type: string
                  description: Residential Country
                termAddress1:
                  type: string
                  description:
                    First line of TERM address. Term address is only available for clients who have enabled the
                    VET Student Loan feature.
                termAddress2:
                  type: string
                  description: Second line of term address
                termCity:
                  type: string
                  description: Term Address suburb, locality or town
                termState:
                  type: string
                  description:
                    "Term Address state / Territory. NOTE: This field is tailored for Australia and accepts only
                    the following values: NSW, VIC, QLD, SA, WA, TAS, NT, ACT or OTH (which means 'Other Australian Territory')
                    or OVS (which means 'Overseas')"
                termPostcode:
                  type: string
                  description: Term Address postcode
                termCountryID:
                  type: number
                  description: Term Address Country - a 4-digit SACC code. You can use this or termCountry
                termCountry:
                  type: string
                  description: Term Address Country
                CountryofBirthID:
                  type: number
                  description:
                    Country of Birth as a valid 4-digit SACC code. For a list of codes, please refer to NCVER website
                    www.ncver.edu.au
                CityofBirth:
                  type: string
                  description: City of Birth. This data is used if later creating a USI for this contact.
                CountryofCitizenID:
                  type: number
                  description:
                    Country of citizenship as a valid 4-digit SACC code. For a list of codes, please refer to NCVER
                    website www.ncver.edu.au
                CitizenStatusID:
                  type: number
                  description:
                    Citizenship status. The valid values are numbers 1-11. For a list of the meanings of these
                    numbers, please contact aXcelerate
                ResidencyStatusID:
                  type: number
                  description: Residency status. For a list of valid numbers/codes, please refer to the TAMS 1.2 specifications.
                LabourForceID:
                  type: number
                  description: AVETMISS Labour force status identifier. For valid values see the AVETMISS documentation
                MainLanguageID:
                  type: number
                  description:
                    AVETMISS Main language other than English spoken at home identifier as a valid 4-digit SACC
                    code. For a list of codes, please refer to NCVER website www.ncver.edu.au
                EnglishProficiencyID:
                  type: number
                  description: AVETMISS Proficiency in spoken English. For valid values see the AVETMISS documentation
                EnglishAssistanceFlag:
                  type: boolean
                  description: A true/false flag to indicate whether English assistance is required
                HighestSchoolLevelID:
                  type: number
                  description: AVETMISS highest school level completed identifier. For valid values see the AVETMISS documentation
                HighestSchoolLevelYear:
                  type: number
                  description:
                    The year the highest school level was completed. Must be a valid year no later than the current
                    year
                AtSchoolFlag:
                  type: boolean
                  description: A true/false AVETMISS flag to indicate whether the contact is currently at secondary school
                AtSchoolName:
                  type: string
                  description: The name of the contact's current secondary school
                PriorEducationStatus:
                  type: boolean
                  description:
                    A true/false AVETMISS flag to indicate whether a contact has successfully completed some post-secondary
                    education. A true value here will be ignored without also passing PriorEducationIDs.
                PriorEducationIDs:
                  type: string
                  description:
                    A comma delimited list of AVETMISS prior educational achievement identifiers to indicate prior
                    higher education. For valid values see the AVETMISS documentation. The Victorian AVETMISS field Prior
                    Educational Achievement Recognition Identifier may be appended (e.g. 420A). Also accepts @ if not specified.
                DisabilityFlag:
                  type: boolean
                  description:
                    A true/false AVETMISS flag to indicate whether the contact considers themselves to have a disability,
                    impairment or long-term condition
                DisabilityTypeIDs:
                  type: string
                  description:
                    A comma delimited list of AVETMISS disability type identifiers. For valid values see the AVETMISS
                    documentation
                IndigenousStatusID:
                  type: number
                  description:
                    AVETMISS indigenous status identifier to indicates a contact who self-identifies as being of
                    Australian Aboriginal or Torres Strait Islander descent. For valid values see the AVETMISS documentation
                ANZSCOCode:
                  type: string
                  description:
                    Australian and New Zealand Standard Classification of Occupations (ANZSCO), ABS catalogue no.1220.0,
                    2009. The major group of this code is used for the Victorian AVETMISS field Client Occupation Identifier
                    (left most digit)
                ANZSICCode:
                  type: string
                  description:
                    Australian and New Zealand Standard Industrial Classification (ANZSIC), ABS catalogue no.1292.0,
                    2006. The division of this code is used for the Victorian AVETMISS field Client Industry of Employment
                    (see ABS catalogue)
                SurveyContactStatusCode:
                  type: string
                  description:
                    AVETMISS 8.0 Survey contact status - Survey contact status identifies reasons to exclude clients
                    from the Student Outcomes Survey and other communications. For a list of possible codes, please refer
                    to the data definitions on the NCVER website AVETMISS Data element definitions
                EmailAddressAlternative:
                  type: string
                  description: AVETMISS 8.0 Alternate email address
                employerContactID:
                  type: number
                  description: The ContactID of the Contact Record who is the Employer of this Contact.
                payerContactID:
                  type: number
                  description: The ContactID of the Contact Record who is the Payer of this Contact.
                supervisorContactID:
                  type: number
                  description: The ContactID of the Contact Record who is the Supervisor of this Contact.
                agentContactID:
                  type: number
                  description: The ContactID of the Contact Record who is the Agent for this Contact.
                coachContactID:
                  type: number
                  description: The ContactID of the Contact Record who is the Coach for this Contact.
                internationalContactID:
                  type: number
                  description: The ContactID of the Contact Record who is the International Contact for this Contact (CRICOS).
                optionalID:
                  type: string
                  description: An optional identifier to use for this Contact record.
                categoryIDs:
                  type: string
                  description: A list of valid category IDs. (adds to Contact ONLY)
                customField_[variableName]:
                  type: string
                  description:
                    'Replace [variableName] with the actual customField variable name to update a customField value
                    against the contact. If updating a custom field that supports multiple values, you can use comma-delimited
                    values or a JSON array. If using comma-delimited, it is expected the data is URL encoded first. For example,
                    to get 2 values: ''A,B'' and ''C'' you would either pass: "[''A,B'',''C'']" or "A%2CB,C"'
                domainIDs:
                  type: string
                  description:
                    A list of domainIDs to set against the contact. This will overwrite any existing domains against
                    the contact. Requires the Contact Domains feature to be enabled in the account.
          application/json:
            schema: *id011
