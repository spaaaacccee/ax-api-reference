      security:
        - ApiToken: []
          WsToken: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: &id007
              type: object
              properties:
                contactID:
                  type: number
                  description: The contact ID of the marketing agent
                agentID:
                  type: number
                  description:
                    PUT Only, the agentID may be used in the body, in place of contactID in the path but only for
                    PUT requests.
                commissionRate:
                  type: number
                  description: The percentage commission, between 0 and 100, that the agent will receive.
                  default: "0"
                taxRuleID:
                  type: number
                  description: The tax rule to be specified for this agent. 1 = Excluding GST, 2 = Including GST, 3 = Exempt
                Custom_Field_[VariableName]:
                  type: string
                  description:
                    "Custom fields may be updated by specifying their variable name prefixed by custom_field_ EG:
                    custom_field_region, custom_field_specialty. Values used should correspond to the custom field specified.
                    Note: this will not create custom fields, they must already exist."
              required:
                - contactID
                - taxRuleID
