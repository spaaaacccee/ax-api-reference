  /accounting/ecommerce/ezypay/plan/search:
    get:
      tags:
        - accounting
      summary: GET /accounting/ecommerce/ezypay/plan/search
      description: Returns an array of ezypay payment plans that are available for paying the passed in moneytary value.
      operationId: get_accounting_ecommerce_ezypay_plan_search
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: amount
          in: query
          required: true
          description: The amount of money that is to be collected.
          schema:
            type: string
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nTERM_ID:The identifier for the payment terms.\nLABEL:The\
            \ user defined label describing the terms to the end user in plain text.\nINITIAL_PAYMENT_AMOUNT:The fixed amount\
            \ of money that will be due at checkout. (zero if a INITIAL_PAYMENT_PERCENTAGE has been set)\nAVAILABLE_PAYMENT_METHODS:The\
            \ payment methods that can be used to pay for the outstanding amount. Valid values are: CREDIT_CARD,BANK_ACCOUNT.\n\
            Depending on the available payment methods the following keys will also exist. The name of these keys are returned\
            \ in the AVAILABLE_PAYMENT_METHODS field.\nCREDIT_CARD: Information related to paying using a credit card. This\
            \ key only exists if CREDIT_CARD is one of the available payment methods.\nBANK_ACCOUNT: Information related to\
            \ paying using direct debit from a bank account. This key only exists if BANK_ACCOUNT is one of the available\
            \ payment methods.\nThe CREDIT_CARD and BANK_ACCOUNT keys have the following sub key:\nSURCHARGE:The surcharge\
            \ applied for using this payment method.\nSURCHARGE.TYPE:0 No Surcharge, 1:Percentage of each transaction amount.\
            \ 2:Fixed amount per transaction.\nSURCHARGE.PERCENT:Percentage of surcharge applied. \nSURCHARGE.AMOUNT:Fixed\
            \ surcharge amount."
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    TERM:
                      - CREDIT_CARD:
                          SURCHARGE:
                            PERCENT: 0
                            TYPE: 0
                            AMOUNT: 0
                        INITIAL_PAYMENT_AMOUNT: 0
                        FREQUENCY:
                          UNIT: w
                        AVAILABLE_PAYMENT_METHODS:
                          - CREDIT_CARD
                          - BANK_ACCOUNT
                        TERM_ID: e045d1e5-7398-4356-ba1b-e6bfce109a79
                        LABEL: Weekly Payments
                        INITIAL_ONE_OF_PAYMENT: 0
                        BANK_ACCOUNT:
                          SURCHARGE:
                            PERCENT: 0
                            TYPE: 0
                            AMOUNT: 0
                      - CREDIT_CARD:
                          SURCHARGE:
                            PERCENT: 0
                            TYPE: 0
                            AMOUNT: 0
                        INITIAL_PAYMENT_AMOUNT: 0
                        FREQUENCY:
                          UNIT: m
                        AVAILABLE_PAYMENT_METHODS:
                          - CREDIT_CARD
                          - BANK_ACCOUNT
                        TERM_ID: 64b9eb32-e6b6-47be-bd05-e4029ac2bd4b
                        LABEL: Monthly Payment
                        INITIAL_ONE_OF_PAYMENT: 0
                        BANK_ACCOUNT:
                          SURCHARGE:
                            PERCENT: 0
                            TYPE: 0
                            AMOUNT: 0
        default:
          $ref: "#/components/responses/Error"
  /accounting/ecommerce/ezypay/fees:
    get:
      tags:
        - accounting
      summary: GET /accounting/ecommerce/ezypay/fees
      description:
        "Retrieves a list of all customer allocated fees configured for the current merchant. Information returned
        by this service resource includes: the type of each fee, the payment method to which the fee applies, the accounting
        code associated with the fee, and the method used to calculate the fee amount (e.g. fixed amount, percentage, or both)."
      operationId: get_accounting_ecommerce_ezypay_fees
      security:
        - ApiToken: []
          WsToken: []
      responses:
        "200":
          description: "Default Response Format: \njson \nSamples\nExample response from ezypay"
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    - pricingCode: failed_payment_fee
                      description: Failed Payment Fee
                      appliesTo: []
                      accountingCode: null
                      chargingOption: AMOUNT
                      amount: 8.5
                      percentage: 0.0
                    - pricingCode: transaction_fee
                      description: Card Fee
                      appliesTo:
                        - MASTERCARD
                        - VISA
                      accountingCode: null
                      chargingOption: BOTH
                      amount: 0.5
                      percentage: 0.37
                    - pricingCode: transaction_fee
                      description: Bank Fee
                      appliesTo:
                        - BANK
                      accountingCode: null
                      chargingOption: BOTH
                      amount: 0.35
                      percentage: 0.15
                    - pricingCode: load_fee
                      description: Load Fee
                      appliesTo: []
                      accountingCode: null
                      chargingOption: AMOUNT
                      amount: 2.0
                      percentage: 0.0
        default:
          $ref: "#/components/responses/Error"
