          description:
            "Default Response Format: \njson \nSamples\nFundingNational\nFundingState\nStudy Reason IDs\nUpon a\
            \ successful enrolment, this returns the unique learnerID for this student's enrolment. It also returns an invoiceID,\
            \ amount and the contactID. Note that for type p bookings, where an invoice has not yet been created, one will\
