      description:
        This endpoint allows clients with Moodle intergation to run the completions for every course in their account.
        You can run this for specific instances or for all instances. If run for all instances, the actual process is done
        as a background process. If the verbose flag is used, this action returns a report of the completion running for individual
        courses. If running for all instances, the verbose report only returns the instances handed to the background process.
      operationId: get_cron_runMoodleCompletions
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: verbose
          in: query
          required: false
          description: |-
            If set, returns a more verbose report.
            Default: true
          schema:
            type: boolean
        - name: type
          in: query
          required: false
          description:
            "The type of course to run completions for. The only valid values are: 'el' (for E-Learning) and 'p'
            (for Programs)"
          schema:
            type: string
        - name: instanceID
          in: query
          required: false
          description: The course ID.
          schema:
            type: number
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nThe return when the verbose flag is on and running for\
            \ all courses.\nThe return when the verbose flag is on and running for a single E-Learning courses. The parameter\
            \ passed for this return would've been type=el, instanceID=555"
          content:
            application/json:
              schema:
                description: Response schema not defined in legacy docs.
              examples:
                example1:
                  value:
                    COUNT: 3
                    SUCCESS: true
                    REPORT:
                      - COURSENAME: aXcelerate Quals Units Courses
                        LEARNINGACTIVITYID: 343
