  /course/enrolment:
    put:
      tags:
        - course
      summary: PUT /course/enrolment
      description: Update an enrolment
      operationId: put_course_enrolment
      security:
        - ApiToken: []
          WsToken: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: &id031
              type: object
              properties:
                contactID:
                  type: number
                  description: The ID of the Contact.
                instanceID:
                  type: number
                  description: The ID of the Activity Instance. (Not required when using subjectCode)
                programInstanceID:
                  type: number
                  description: This is required when updating a subject enrolment. (InstanceID of the Accredited Program)
                subjectCode:
                  type: string
                  description: This can be used to update a subject enrolment (instead of InstanceID).
                type:
                  type: string
                  description:
                    The type of the activity. w = workshop, p = accredited program, s = subject (of an accredited
                    program), el = e-learning.
                logType:
                  type: string
                  description:
                    "[Type=W] Change/add status entry for a Participant: \n'Tentative' - Tentative. \n'Booked'\
                    \ - Booked / In Progress. \n'Cancelled' - Cancelled. \n'Invoiced' - Invoice has been sent. \n'Paid' -\
                    \ Invoice has been paid. \n'Completed' - Completed."
                logEntryDate:
                  type: string
                  description: "[Type=W,Type=EL] The date the new status was requested"
                  default: Now
                theMethod:
                  type: string
                  description: "[Type=W] How the new status was requested: 'Phone,Email,Fax,In Person,Online,Other'"
                  default: Online
                allowDuplicateEntry:
                  type: string
                  description: "[Type=W] Allow duplicate status entry for a Participant."
                  default: "false"
                cost:
                  type: number
                  description: "[Type=S] Subject Cost"
                PONum:
                  type: string
                  description: "[Type=W] Purchase Order Number."
                discountIDs:
                  type: string
                  description: "[Type=W] Any discount IDs that should apply to the Participant."
                invoiceNum:
                  type: string
                  description: "[Type=W] The Invoice ID associated with the Participant."
                finCodeID:
                  type: string
                  description: "[Type=W & P] The Finance Code ID associated with the Participant."
                financeModelID:
                  type: string
                  description: "[Type=P] The Finance Model ID to be associated with the Participant."
                additionalComments:
                  type: string
                  description:
                    "[Type=W] Participant Enrolment (General) Comments (see also 'comments' for Status related
                    commets)."
                DateEnrolled:
                  type: string
                  format: date
                  description: "[Type=P,Type=S] The Date the Contact Enrolled."
                DateCommenced:
                  type: string
                  format: date
                  description: "[Type=P] The Activity Commencement Date."
                DateCompletionExpected:
                  type: string
                  format: date
                  description: "[Type=P] The Expected Completion Date."
                DateCompleted:
                  type: string
                  format: date
                  description: "[Type=P] The Actual Completion Date."
                isCancelled:
                  type: boolean
                  description: "[Type=P] DEPRECATED - Please use the enrolmentStatus parameter"
                trainerID:
                  type: number
                  description: "[Type=P,Type=S] The Contact ID of the Trainer associated with this enrolment."
                enrolmentStatus:
                  type: string
                  description:
                    "Updates the enrolment to one of the following statuses:\n[Type=P] \n'tent' - Tentative. Rules:\
                    \ No subject enrolments may exist \n'ip' - In Progress. \n'canc' - Cancelled. Rules: No interim subject\
                    \ enrolments may exist \n'def' - Deferred. \n'susp' - Suspended. \n'comp' - Completed. Rules: No interim\
                    \ subject enrolments may exist \n[Type=EL] \n'A' - Approved \n'Cm' - Commenced / In Progress. \n'C' -\
                    \ Cancelled. \n'F' - Failed. \n'Co' - Completed. \nIf an enrolment status change is not successful, no\
                    \ changes will be applied to the enrolment."
                vicProgramStatusIDCode:
                  type: string
                  description:
                    "[Type=P] The Program Status Identifier field for AVETMISS reporting. See Samples below for
                    a full list of options."
                stageDate_[currentStage]:
                  type: string
                  description: "[Type=P] Useage: 'stageDate_1'='2014-12-12' to change the stage 1 date"
                AddUnitCompetency:
                  type: string
                  description: "[Type=P] List of Unit IDs to add to the enrolment"
                AddElectiveUnit:
                  type: string
                  description: "[Type=P] List of Unit IDs to add to the elective list"
                AddUnitCompetencyByCode:
                  type: string
                  description: "[Type=P] List of Unit/Subject Codes to add to the enrolment"
                AddElectiveUnitByCode:
                  type: string
                  description: "[Type=P] List of Unit/Subject Codes to add to the elective list"
                ModuleIDList:
                  type: string
                  description: "[Type=P] List of Module IDs to add (VSL only)"
                hasRPL:
                  type: string
                  description: "[Type=P] Update VET Student Loans RPL data (VSL only)"
                competent:
                  type: number
                  description:
                    "[Type=S] competency code - To update a Subject use the UnitID as the InstanceID & ContactID.
                    See Competency Code table below (use the integer value)"
                outcomeTrainingOrg:
                  type: string
                  description: "[Type=S] competency code - internal (outcome identifier - training organisation)"
                activityStartDate:
                  type: string
                  format: date
                  description: "[Type=S,Type=EL] Activity Start Date"
                proposedEndDate:
                  type: string
                  format: date
                  description: "[Type=S] Proposed End Date"
                activityEndDate:
                  type: string
                  format: date
                  description: "[Type=S,Type=EL] Activity End Date"
                deliveryModeAVETMISS:
                  type: string
                  description:
                    '[Type=S] Delivery Mode - AVETMISS. This is to be used for AVETMISS 8.0 reporting. Provide
                    a comma-delimited list of the applicable delivery modes character codes listed under "Samples" below.
                    The first value will be treated as the predominant delivery mode for reporting purposes. Note that delivery
                    mode is typically stored against a subject OR a course insteance (type=P), so these values will not be
                    affected by this endpoint. Examples: "I", "W,E", "E,I,W"'
                deliveryModeRAPT:
                  type: string
                  description:
                    '[Type=S] Delivery Mode - RAPT/TAMS. This is to be used for RAPT 3.0+ reporting. Provide a
                    comma-delimited list of the applicable delivery modes character codes listed under "Samples" below. The
                    second and third values will be reported as supplementary delivery modes. All values after that will not
                    be reported. Note that the value "Z - Not Applicable" cannot be supplied, as this is calculated dynamically
                    based on the competency status. Note also that delivery mode is typically stored against a subject OR
                    a course insteance (type=P), so these values will not be affected by this endpoint. Examples: "C", "E,S".'
                vet_DeliveryMode:
                  type: string
                  description: "[Type=S] DEPRECATED from 2018. Delivery Mode - Legacy (AVETMISS 7.0)"
                doNotReportAvetmiss:
                  type: boolean
                  description: "[Type=S] A flag to prevent this record from being exported in AVETMISS reports."
                comments:
                  type: string
                  description: "[Type=S,Type=W,Type=EL] Comments (Brief Comment)"
                waEnrolmentCategoryID:
                  type: number
                  description: "[Type=S] WA Enrolment Category ID"
                hoursAttended:
                  type: number
                  description: "[Type=S] Hours attended"
                deliveryLocationId:
                  type: number
                  description: "[Type=S] Delivery Location ID"
                noFunding:
                  type: boolean
                  description: "[Type=S] Not Funded / RAPT/TAMS Funding Removed flag"
                scheduledHours:
                  type: number
