  /customFields:
    get:
      tags:
        - customFields
      summary: GET /customFields
      description: Create a new custom field or search existing custom fields.
      operationId: get_customFields
      security:
        - ApiToken: []
          WsToken: []
      parameters:
        - name: linkTo
          in: query
          required: true
          description: Where the Custom Field links to. Available options are [contact,classEnrolment,class,workshop,workshopBooking,organisation,marketingAgent,portfolio,studentActivity,enrolmentGroup,unitEnrolment].
          schema:
            type: string
        - name: variableName
          in: query
          required: true
          description:
            "The internal name of the Custom Field, used for setting the value in other endpoints i.e. customField_ant
            : red."
          schema:
            type: string
        - name: type
          in: query
          required: true
          description: The Type of the Custom Field - i.e. Text, Select, Radio. Available options are [text,number,date,textarea,html,url,select,radio,select-multi,checkbox].
          schema:
            type: string
        - name: options
          in: query
          required: false
          description:
            For Custom Fields where a list of values are needed. One of the listed types must be used [select,radio,select-multi,checkbox].
            Example string with brackets ['one','two','three'].
          schema:
            type: string
        - name: label
          in: query
          required: false
          description: The Label for the Custom Field.
          schema:
            type: string
        - name: active
          in: query
          required: false
          description: Whether the field is active or not.
          schema:
            type: boolean
        - name: includeAnyStatus
          in: query
          required: false
          description:
            By default, only the active custom fields are returned. If this field is set, both active and inactive
            custom fields will be returned.
          schema:
            type: boolean
        - name: orderBy
          in: query
          required: false
          description: The field to order the results by. Default ordered by label name.
          schema:
            type: string
        - name: notLinkedTo
          in: query
          required: false
          description: Exclude the linkTo value from the results.
          schema:
            type: string
        - name: searchTerm
          in: query
          required: false
          description: Search for a specific term in the label or variable name.
          schema:
            type: string
        - name: mandatory
          in: query
          required: false
          description: Whether the field is mandatory or not for completion (Unit Enrolments only).
          schema:
            type: boolean
        - name: availableToExternal
          in: query
          required: false
          description:
            Whether this field should be displayed externally (i.e. Certificate Validation page) (Unit Enrolments
            only).
          schema:
            type: boolean
        - name: offset
          in: query
          required: false
          description: Used for paging - start at record. Both offset and limit needs to work paging.
          schema:
            type: number
        - name: limit
          in: query
          required: false
          description: Used for paging - total records to retrieve. Both offset and limit needs to work paging.
          schema:
            type: number
      responses:
        "200":
          description:
            "Default Response Format: \njson \nSamples\nA successful POST request will return the newly created\
            \ custom field:\nA successful GET request will return an array of custom fields:"
