        new one. If you ended up creating duplicate contacts, they can be later merged by logging into aXcelerate.
      operationId: post_contact
      security:
        - ApiToken: []
          WsToken: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: &id010
              type: object
              properties:
                givenName:
                  type: string
                  description: Given (first) name. Maximum 40 characters.
                surname:
                  type: string
                  description: Surname (last name). Maximum 40 characters.
                title:
                  type: string
                  description: Tile/salutation
                emailAddress:
                  type: string
                  description: Email address. Must be a valid email address
                ContactActive:
                  type: boolean
                  description: Retrieve Active Contact Records. Passing false will return inactive records.
                  default: "true"
                dob:
                  type: string
                  format: date
                  description: Date of Birth in the format YYYY-MM-DD. This cannot be dated in the future.
                sex:
                  type: string
                  description: Must be only a single letter. Valid values are M, F or X (for Other)
                middleName:
                  type: string
                  description: Middle name(s). Maximum 40 characters.
                phone:
                  type: string
                  description: Home phone number
                mobilephone:
                  type: string
                  description: Mobile phone number
                workphone:
                  type: string
                  description: Work phone number
                fax:
                  type: string
                  description: Fax number
                organisation:
                  type: string
                  description: Organisation name
                orgId:
                  type: string
                  description:
                    ID of the organisation to assign the contact. Will be their primary organisation if the contact
                    has multiple.
                orgIds:
                  type: string
                  description:
                    A list of organisation IDs to set against the contact. This will overwrite any existing non-primary
                    organisations against the contact. This will allow upto five organisation IDs.
                position:
                  type: string
                  description: Position within the organisation
                section:
                  type: string
                  description: Section within the organisation
                division:
                  type: string
                  description: Division within the organisation
                SourceCodeID:
                  type: number
                  description:
                    The client-specific sourceID from the list set up in aXcelerate and returned from the contact/sources
                    resource.
                HistoricClientID:
                  type: string
                  description:
                    "The Historical ID used with the student record. IMPORTANT IF: you have reported a person previously
                    with a different SMS."
                USI:
                  type: string
                  description:
                    "Unique Student Identifier (USI). A 10-digit code. If passed, this code must conform to the
                    minimum validation: It must be 10 digits in length and consist of only capital letters and numbers, excluding
                    I, 1, 0 and O."
                LUI:
                  type: string
                  description: The Queensland Studies Authority Learner Unique Identifier (LUI). A 10-digit, numeric code.
